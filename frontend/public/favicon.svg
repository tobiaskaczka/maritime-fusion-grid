<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Maritime Fusion Grid favicon</title>
  <desc id="desc">A dark blue-gray globe icon with lighter blue-gray land and subtle grid lines.</desc>

  <defs>
    <clipPath id="globeClip">
      <circle cx="32" cy="32" r="27"/>
    </clipPath>

    <radialGradient id="water" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#162533"/>
      <stop offset="58%" stop-color="#0b1721"/>
      <stop offset="100%" stop-color="#050b11"/>
    </radialGradient>

    <linearGradient id="land" x1="14" y1="8" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#647987"/>
      <stop offset="100%" stop-color="#344854"/>
    </linearGradient>
  </defs>

  <!-- Outer globe -->
  <circle cx="32" cy="32" r="29" fill="#03070b"/>
  <circle cx="32" cy="32" r="27" fill="url(#water)"/>

  <g clip-path="url(#globeClip)">
    <!-- Subtle latitude lines -->
    <path d="M5 22 C18 18, 46 18, 59 22" fill="none" stroke="#7f95a3" stroke-opacity=".23" stroke-width="1.4"/>
    <path d="M4 32 C18 29, 46 29, 60 32" fill="none" stroke="#7f95a3" stroke-opacity=".25" stroke-width="1.4"/>
    <path d="M5 42 C18 46, 46 46, 59 42" fill="none" stroke="#7f95a3" stroke-opacity=".23" stroke-width="1.4"/>

    <!-- Subtle longitude lines -->
    <ellipse cx="32" cy="32" rx="12" ry="27" fill="none" stroke="#7f95a3" stroke-opacity=".23" stroke-width="1.4"/>
    <ellipse cx="32" cy="32" rx="22" ry="27" fill="none" stroke="#7f95a3" stroke-opacity=".18" stroke-width="1.2"/>

    <!-- Land masses, simplified for favicon scale -->
    <path d="M18.4 13.7
             C15.2 16.2 13.5 20.1 14.5 23.3
             C15.3 25.8 18.3 26.6 19.5 29.2
             C20.7 31.8 18.9 34.7 21.5 37.4
             C23.6 39.6 25.2 42.2 24.7 45.5
             C24.3 48.3 27.3 50.5 29.4 48.1
             C31.1 46.2 29.1 43.4 30.3 40.8
             C31.3 38.7 34.1 38.8 34.7 36.3
             C35.4 33.3 31.9 32.1 30.2 29.6
             C28.8 27.5 30.5 25.5 28.8 23.4
             C26.8 21 23.8 22 22.1 19.7
             C20.7 17.8 21 14.8 18.4 13.7Z"
          fill="url(#land)" opacity=".96"/>

    <path d="M39.9 11.9
             C43.6 13.1 47.3 15.4 49.2 18.7
             C50.4 20.8 49.6 22.8 47.1 23.2
             C44.7 23.6 42.1 21.6 40.2 23.4
             C38.5 25.1 40.1 27.7 42.8 28.4
             C46.2 29.2 49.1 31.4 48.4 34.4
             C47.7 37.5 43.1 36.2 41.2 38.4
             C39.6 40.2 41.7 43.4 39.1 45.3
             C36.8 47.1 33.9 44.9 34.5 42.3
             C35.1 39.7 36.9 37.9 36 35.3
             C35.1 32.7 32.2 31.6 31.7 29
             C31.2 26.1 34.1 24.5 35.1 22.1
             C36.3 19.1 35.2 14.7 39.9 11.9Z"
          fill="url(#land)" opacity=".9"/>

    <!-- Maritime/fusion grid signal points -->
    <circle cx="19.5" cy="32" r="1.7" fill="#9fb2be" opacity=".85"/>
    <circle cx="43.7" cy="30" r="1.7" fill="#9fb2be" opacity=".85"/>
    <circle cx="35.2" cy="44.4" r="1.5" fill="#9fb2be" opacity=".8"/>
    <path d="M19.5 32 L43.7 30 L35.2 44.4 Z"
          fill="none" stroke="#9fb2be" stroke-opacity=".34" stroke-width="1.2"/>
  </g>

  <!-- Rim -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#718693" stroke-opacity=".45" stroke-width="2"/>
</svg>
